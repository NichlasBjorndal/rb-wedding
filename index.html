<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nichlas & Malene — 10. oktober 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pumpkin:  #c85f18;
      --amber:    #e09a38;
      --amber-lt: #f0c878;
      --cream:    #f7ede0;
      --sand:     #efe0c8;
      --bark:     #2a1a0a;
      --bark-md:  #4a2e14;
      --moss:     #4a5e38;
      --rust:     #a84010;
      --muted:    #7a5a3a;
      --border:   #d8c8a8;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--bark);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      line-height: 1.75;
      font-size: 16px;
    }

    /* ── LANGUAGE SWITCHER ─────────────────── */
    .lang-switcher {
      position: fixed;
      top: 1rem;
      right: 1.2rem;
      z-index: 999;
      display: flex;
      background: rgba(247,237,224,.92);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 3px;
      gap: 2px;
      box-shadow: 0 2px 12px rgba(42,26,10,.12);
    }

    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .15em;
      padding: .35rem .85rem;
      border-radius: 24px;
      color: var(--muted);
      transition: background .25s, color .25s;
    }

    .lang-btn.active {
      background: var(--pumpkin);
      color: #fff;
    }

    /* text swap transition */
    .t {
      transition: opacity .2s ease;
    }

    body.switching .t {
      opacity: 0;
    }

    /* ── HERO ──────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5rem 2rem 4rem;
      position: relative;
      overflow: hidden;
      background: linear-gradient(175deg, #f2e0c5 0%, var(--sand) 60%, #e8d0a8 100%);
    }

    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 45% at 10% 90%, rgba(200,95,24,.18) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 90% 10%, rgba(74,94,56,.14) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(224,154,56,.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero > * { position: relative; z-index: 1; }

    .hero-leaves-top {
      position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      width: min(600px, 100%);
      opacity: .85; pointer-events: none; z-index: 0;
    }

    .hero-leaves-bottom {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: min(700px, 100%);
      opacity: .75; pointer-events: none; z-index: 0;
    }

    .hero-eyebrow {
      font-size: .68rem;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: var(--moss);
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .hero-names {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(3.5rem, 10vw, 7.5rem);
      line-height: 1.0;
      color: var(--bark);
    }

    .hero-amp { color: var(--pumpkin); font-style: normal; }

    .hero-divider-row {
      display: flex; align-items: center; gap: 1.2rem;
      margin: 1.8rem 0; width: 100%; max-width: 380px;
    }

    .hero-rule {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--amber-lt), transparent);
    }

    .hero-date {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; letter-spacing: .12em; color: var(--bark-md);
    }

    .hero-tagline {
      font-size: .95rem; color: var(--muted);
      max-width: 400px; line-height: 1.85; margin-top: .6rem;
    }

    .scroll-hint {
      margin-top: 3rem; color: var(--amber);
      font-size: .65rem; letter-spacing: .25em; text-transform: uppercase;
      display: flex; flex-direction: column; align-items: center; gap: .5rem;
      animation: bob 2.5s ease-in-out infinite;
    }

    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(7px)} }

    /* ── NAV ───────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(247,237,224,.93);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: center; flex-wrap: wrap;
      gap: .3rem 2rem; padding: .85rem 1.5rem;
    }

    nav a {
      text-decoration: none; color: var(--muted);
      font-size: .7rem; letter-spacing: .2em; text-transform: uppercase;
      font-weight: 500; transition: color .25s;
    }

    nav a:hover { color: var(--pumpkin); }

    /* ── SECTION ───────────────────────────── */
    .section { max-width: 820px; margin: 0 auto; padding: 6rem 2rem; }

    .section-tag {
      font-size: .65rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--pumpkin); font-weight: 500; margin-bottom: .7rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif; font-weight: 400;
      font-size: clamp(2.2rem, 5vw, 3.4rem); line-height: 1.1; margin-bottom: 1.4rem;
    }

    .section-title em { color: var(--pumpkin); font-style: italic; }

    .section-lead {
      color: var(--muted); font-size: .93rem; max-width: 540px;
      margin-bottom: 3rem; padding-left: 1rem; border-left: 3px solid var(--amber-lt);
    }

    .divider-row {
      display: flex; align-items: center; gap: 1rem;
      max-width: 820px; margin: 0 auto; padding: 0 2rem;
    }

    .divider-row::before, .divider-row::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .divider-icon { font-size: 1.2rem; }

    /* ── CARDS ─────────────────────────────── */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 1.4rem; }

    .card {
      background: linear-gradient(145deg, #fdf5e8, var(--sand));
      border: 1px solid var(--border); border-radius: 6px;
      padding: 1.8rem 1.6rem; transition: transform .3s, box-shadow .3s;
    }

    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(42,26,10,.1); }

    .card-icon { font-size: 1.5rem; margin-bottom: .9rem; display: block; }

    .card h3 {
      font-family: 'Playfair Display', serif; font-size: 1.15rem;
      font-weight: 500; margin-bottom: .55rem;
    }

    .card p, .card a { font-size: .87rem; color: var(--muted); line-height: 1.75; }
    .card a { color: var(--pumpkin); text-decoration: none; }
    .card a:hover { text-decoration: underline; }

    /* ── TIMELINE ──────────────────────────── */
    .tl-row { display: grid; grid-template-columns: 110px 28px 1fr; align-items: stretch; gap: 0 1rem; }
    .tl-time { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--pumpkin); text-align: right; padding-top: .1rem; padding-bottom: 2rem; }
    .tl-center { display: flex; flex-direction: column; align-items: center; }
    .tl-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--amber); border: 2px solid var(--pumpkin); flex-shrink: 0; margin-top: .25rem; }
    .tl-stem { flex: 1; width: 1px; background: linear-gradient(var(--amber-lt), var(--border)); margin: 4px 0; }
    .tl-row:last-child .tl-stem { display: none; }
    .tl-body { padding-bottom: 2rem; }
    .tl-body h4 { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 500; margin-bottom: .25rem; }
    .tl-body p { font-size: .87rem; color: var(--muted); }

    /* ── FAQ ───────────────────────────────── */
    details { border-bottom: 1px solid var(--border); }
    details:first-of-type { border-top: 1px solid var(--border); }

    summary {
      list-style: none; cursor: pointer; padding: 1.2rem 0;
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--bark); user-select: none;
    }

    summary::-webkit-details-marker { display: none; }

    .faq-plus {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--sand);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; line-height: 1; color: var(--pumpkin);
      transition: transform .35s, background .3s;
    }

    details[open] .faq-plus { transform: rotate(45deg); background: var(--pumpkin); border-color: var(--pumpkin); color: #fff; }

    .faq-body { padding: .2rem 0 1.4rem; font-size: .9rem; color: var(--muted); max-width: 640px; line-height: 1.85; }
    .faq-body a { color: var(--pumpkin); }
    .faq-body strong { font-weight: 500; color: var(--bark-md); }

    /* ── RSVP ──────────────────────────────── */
    .rsvp-box {
      background: linear-gradient(135deg, var(--bark) 0%, var(--bark-md) 100%);
      border-radius: 8px; padding: 4rem 3rem; text-align: center;
      position: relative; overflow: hidden;
    }

    .rsvp-box::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 10% 100%, rgba(200,95,24,.28) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 90% 0%, rgba(224,154,56,.22) 0%, transparent 60%);
      pointer-events: none;
    }

    .rsvp-box > * { position: relative; z-index: 1; }
    .rsvp-box .section-tag { color: var(--amber); }
    .rsvp-box .section-title { color: #fdf5e8; margin-bottom: 1rem; }
    .rsvp-box p { color: rgba(253,245,232,.65); font-size: .92rem; max-width: 420px; margin: 0 auto 2rem; }

    .btn {
      display: inline-block; padding: .9rem 2.6rem; background: var(--pumpkin);
      color: #fff; text-decoration: none; font-size: .75rem;
      letter-spacing: .22em; text-transform: uppercase; font-weight: 500;
      border-radius: 3px; transition: background .3s, transform .2s;
    }

    .btn:hover { background: var(--rust); transform: translateY(-2px); }

    /* ── FOOTER ────────────────────────────── */
    footer {
      text-align: center; padding: 2.5rem 2rem;
      font-size: .78rem; color: var(--muted); letter-spacing: .1em;
      border-top: 1px solid var(--border); background: var(--sand);
    }

    /* ── REVEAL ────────────────────────────── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .65s ease, transform .65s ease; }
    .reveal.visible { opacity: 1; transform: none; }

    @media (max-width: 600px) {
      .tl-row { grid-template-columns: 72px 20px 1fr; }
      .rsvp-box { padding: 2.5rem 1.5rem; }
      .lang-switcher { top: .6rem; right: .6rem; }
    }
  </style>
</head>

<script>
  // ── LANGUAGE TOGGLE ──────────────────────────────────────
  const STORAGE_KEY = 'nm-wedding-lang';
  let currentLang = localStorage.getItem(STORAGE_KEY) || 'da';

  function setLang(lang) {
    if (lang === currentLang) return;
    currentLang = lang;
    localStorage.setItem(STORAGE_KEY, lang);

    // Fade out
    document.body.classList.add('switching');

    setTimeout(() => {
      applyLang(lang);
      document.body.classList.remove('switching');
    }, 200);
  }

  function applyLang(lang) {
    document.documentElement.lang = lang;

    // Swap all translatable text nodes
    document.querySelectorAll('.t').forEach(el => {
      const val = el.getAttribute('data-' + lang);
      if (val !== null) el.innerHTML = val;
    });

    // Update page title
    document.title = lang === 'da'
      ? 'Nichlas & Malene — 10. oktober 2026'
      : 'Nichlas & Malene — 10 October 2026';

    // Update button states
    document.getElementById('btn-da').classList.toggle('active', lang === 'da');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  }

  // Apply on load
  applyLang(currentLang);

  // ── SCROLL REVEAL ─────────────────────────────────────────
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.reveal').forEach(el => {
    const siblings = [...el.parentElement.querySelectorAll(':scope > .reveal')];
    const idx = siblings.indexOf(el);
    if (idx > 0) el.style.transitionDelay = `${idx * 80}ms`;
    io.observe(el);
  });
</script>
